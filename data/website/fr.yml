        <div>   <p><strong>Tant que vous êtes là ;)</strong>, voici 4 manières de suivre et de soutenir le projet d’ApresLaBiere :</p>  <p>    <strong>1) Soutenir ApresLaBiere sur </strong>    <a href="https://fr.tipeee.com/apreslabiere" target="_blank">      <strong>Tipeee</strong>    </a> (occasionnellement parce que cet article était génial ou régulièrement pour l'"ensemble de l'œuvre")  </p>  <p>    <a class="icon" href="https://fr.tipeee.com/apreslabiere" target="_blank">      <img src="https://osuny-1b4da.kxcdn.com/o82aekgs84qob9kntvkb214m3q0f?format=webp&width=1536&height=2720&&fit=inside&quality=50" alt="Soutenir sur Tipeee" loading="lazy">    </a>  </p>  <form action="https://apreslabiere.us17.list-manage.com/subscribe/post?u=ce9bb6293d106e4e91668272f&id=79ab375d5d&f_id=007ee3e3f0" method="post" target="_blank">    <p>      <strong>2) Vous abonner à la "gazette"</strong> pour recevoir les derniers articles / vidéos directement dans votre boîte mail (sans oublier d'ajouter jeanlou(at)apreslabiere.fr à vos emails favoris)    </p>    <div>      <input type="email" name="EMAIL" placeholder="Votre adresse email" required>      <button type="submit" name="subscribe">S'abonner</button>    </div>  </form>  <p>    <strong>3) Partager, liker et suivre</strong> ApresLaBiere sur <a href="https://bsky.app/profile/apreslabiere.fr" target="_blank">Bsky</a> ou <a href="https://www.linkedin.com/in/jean-lou-fourquet" target="_blank">Linkedin</a>  </p>  <p>    <strong>4) <a href="https://homoconscientus.fr/" target="_blank">Penser à faire appel à Homo Conscientus (moi :))</a>    </strong> pour des conférences, des formations ou des ateliers sur le sujet dans votre organisation ou école.  </p></div>





