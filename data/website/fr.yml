        <div>   <p style="margin-top:.75rem !important; margin-bottom:0 !important;">     <strong>Tant que vous êtes là ;)</strong>, voici 5 manières de suivre et de soutenir le projet d’ApresLaBiere :</p>  <p style="margin-top:.75rem !important; margin-bottom:0 !important;">    <strong>1) Soutenir ApresLaBiere sur </strong>    <a href="https://fr.tipeee.com/apreslabiere" target="_blank">      <strong>Tipeee</strong>    </a> (occasionnellement parce que cet article était génial ou régulièrement pour l'"ensemble de l'œuvre")  </p>  <p style="margin-top:.75rem !important; margin-bottom:0 !important; text-align:center !important;">    <a href="https://fr.tipeee.com/apreslabiere" target="_blank" style="text-decoration:none !important; border:none !important;">      <img src="https://osuny-1b4da.kxcdn.com/o82aekgs84qob9kntvkb214m3q0f?format=webp&width=1536&height=2720&&fit=inside&quality=50" alt="Soutenir sur Tipeee" style="border:none !important;" loading="lazy">    </a>  </p>  <div style="margin:.75rem auto !important;">    <form action="https://apreslabiere.us17.list-manage.com/subscribe/post?u=ce9bb6293d106e4e91668272f&id=79ab375d5d&f_id=007ee3e3f0" method="post" target="_blank">      <p style="margin:0 0 .5rem 0 !important; color:#666 !important; font-size:1.1rem !important;">        <strong>2) Vous abonner à la "gazette"</strong> pour recevoir les derniers articles / vidéos directement dans votre boîte mail (sans oublier d'ajouter jeanlou(at)apreslabiere.fr à vos emails favoris)      </p>      <div>        <input type="email" name="EMAIL" placeholder="Votre adresse email" required style="width: 100%; max-width: 400px; padding:.75rem 1rem !important; border:2px solid #ddd !important; border-radius:8px !important; font-size:1.1rem !important; outline:none !important; margin-bottom: 8px;">        <button type="submit" name="subscribe" style="padding:.75rem 1.5rem !important; background:#d4a017 !important; color:#fff !important; border:none !important; border-radius:8px !important; font-size:1.3rem !important; font-weight:600 !important; cursor:pointer !important;">S'abonner</button>      </div>    </form>  </div>  <p style="margin-top:.75rem !important; margin-bottom:0 !important;">    <strong>3) Partager, liker et suivre</strong> ApresLaBiere sur <a href="https://bsky.app/profile/apreslabiere.fr" target="_blank">Bsky</a> ou <a href="https://www.linkedin.com/in/jean-lou-fourquet" target="_blank">Linkedin</a>  </p>  <p style="margin-top:.75rem !important; margin-bottom:0 !important;">    <strong>4) <a href="https://homoconscientus.fr/" target="_blank">Penser à faire appel à Homo Conscientus (moi :))</a>    </strong> pour des conférences, des formations ou des ateliers sur le sujet dans votre organisation ou école.  </p></div>





